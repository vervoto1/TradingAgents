services:
  tradingagents:
    build: .
    container_name: tradingagents
    env_file:
      - .env
    environment:
      # With host networking, vLLM is on localhost just like running natively
      - DEEP_THINK_URL=http://localhost:8001/v1
      - QUICK_THINK_URL=http://localhost:8001/v1
    volumes:
      # Persist reports on the host
      - ./reports:/app/reports
      # Persist data cache between runs
      - tradingagents-cache:/app/tradingagents/dataflows/data_cache
    # Use host network — same networking as running natively
    # Avoids Docker NAT issues with yfinance/Yahoo connections
    network_mode: host
    # Keep container running for interactive access
    entrypoint: ["tail", "-f", "/dev/null"]
    stdin_open: true
    tty: true
    restart: unless-stopped

volumes:
  tradingagents-cache:
